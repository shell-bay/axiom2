name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Change directory to project root
      run: cd AlpineTerminal

    - name: Grant execute permission for gradlew
      run: chmod +x AlpineTerminal/gradlew

    - name: Build with Gradle
      run: ./AlpineTerminal/gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: AlpineTerminal/app/build/outputs/apk/debug/app-debug.apk

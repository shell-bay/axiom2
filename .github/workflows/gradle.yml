name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Dynamically Generate All Gradle Configuration Files
      run: |
        # Create the comprehensive root build configuration aligned to Kotlin 1.9.0
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.0'
                classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.0'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        project(':app') {
            apply plugin: 'com.android.application'
            apply plugin: 'org.jetbrains.kotlin.android'
            android {
                namespace 'com.alpineterminal'
                compileSdk 34
                defaultConfig {
                    applicationId "com.alpineterminal"
                    minSdk 24
                    targetSdk 34
                    versionCode 1
                    versionName "1.0"
                    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
                }
                buildTypes {
                    release {
                        minifyEnabled false
                    }
                }
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_17
                    targetCompatibility JavaVersion.VERSION_17
                }
                kotlinOptions {
                    jvmTarget = '17'
                }
                buildFeatures {
                    compose true
                }
                composeOptions {
                    // Downgraded to 1.5.0 to match Kotlin 1.9.0 alignment perfectly
                    kotlinCompilerExtensionVersion '1.5.0'
                }
                packaging {
                    jniLibs {
                        useLegacyPackaging = true
                    }
                }
            }
            dependencies {
                implementation 'androidx.core:core-ktx:1.12.0'
                implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
                implementation 'androidx.activity:activity-compose:1.8.0'
                implementation platform('androidx.compose:compose-bom:2023.08.00')
                implementation 'androidx.compose.ui:ui'
                implementation 'androidx.compose.ui:ui-graphics'
                implementation 'androidx.compose.ui:ui-tooling-preview'
                implementation 'androidx.compose.material3:material3'
                implementation 'androidx.compose.material:material-icons-extended'
                implementation 'androidx.security:security-crypto:1.1.0-alpha06'
                implementation 'com.squareup.retrofit2:retrofit:2.9.0'
                implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
                implementation 'com.squareup.okhttp3:okhttp:4.11.0'
                testImplementation 'junit:junit:4.13.2'
            }
        }
        EOF

        # Link the app directory layout structural module
        echo "include ':app'" > settings.gradle

        # Force runner memory limits and enable mandatory AndroidX libraries
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" > gradle.properties
        echo "org.gradle.parallel=false" >> gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        echo "kotlin.compiler.execution.strategy=in-process" >> gradle.properties
        echo "android.enableResourceOptimizations=false" >> gradle.properties
        echo "android.suppressUnsupportedCompileSdk=34" >> gradle.properties

        # Ensure directory structures are correctly resolved
        mkdir -p app

    - name: Patch Source Code Compiler Errors
      run: |
        echo "No patching needed, source files are fixed!"

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew
      continue-on-error: true

    - name: Compile and Build Debug APK
      run: |
        export GRADLE_OPTS="-Xmx2048m -XX:MaxMetaspaceSize=512m"
        ./gradlew assembleDebug --no-daemon --no-build-cache --stacktrace

    - name: Export Generated APK Artifact to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Dynamically Generate All Gradle Configuration Files
      run: |
        # Create the comprehensive root build configuration
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.0'
                classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.20'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        project(':app') {
            apply plugin: 'com.android.application'
            apply plugin: 'org.jetbrains.kotlin.android'
            android {
                namespace 'com.example.axiom2'
                compileSdk 34
                defaultConfig {
                    applicationId "com.example.axiom2"
                    minSdk 24
                    targetSdk 34
                    versionCode 1
                    versionName "1.0"
                    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
                }
                buildTypes {
                    release {
                        minifyEnabled false
                    }
                }
                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_17
                    targetCompatibility JavaVersion.VERSION_17
                }
                kotlinOptions {
                    jvmTarget = '17'
                }
            }
            dependencies {
                implementation 'androidx.core:core-ktx:1.12.0'
                implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
                testImplementation 'junit:junit:4.13.2'
            }
        }
        EOF

        # Link the app directory layout structural module
        echo "include ':app'" > settings.gradle

        # Force severe runner memory limits to eliminate out-of-memory container drops
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" > gradle.properties
        echo "org.gradle.parallel=false" >> gradle.properties

        # Ensure directory structures are correctly resolved
        mkdir -p app

    - name: Grant Execute Permission for Gradle Wrapper
      run: chmod +x gradlew
      continue-on-error: true

    - name: Compile and Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Export Generated APK Artifact to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
